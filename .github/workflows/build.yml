name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run CI
        run: go run ./cmd/scripts ci

      - name: Upload binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: aws-mcp-proxy-linux-amd64
          path: bin/aws-mcp-proxy
