name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, without the leading v. Example: 1.2.3"
        required: true
        type: string
      commit:
        description: "Optional commit SHA to tag and release. Defaults to the current HEAD of main."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate-and-tag:
    name: Validate Inputs And Create Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      commit: ${{ steps.validate.outputs.commit }}
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout
        # https://github.com/actions/checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release inputs
        id: validate
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_COMMIT: ${{ inputs.commit }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION#v}"
          tag="v${version}"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be M.m.p, for example 1.2.3"
            exit 1
          fi

          git fetch --force origin main:refs/remotes/origin/main
          git fetch --force --tags origin

          if [[ -n "${INPUT_COMMIT}" ]]; then
            commit="$(git rev-parse "${INPUT_COMMIT}^{commit}")"
          else
            commit="$(git rev-parse refs/remotes/origin/main^{commit})"
          fi
          if ! git merge-base --is-ancestor "${commit}" refs/remotes/origin/main; then
            echo "::error::commit ${commit} is not reachable from main"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::tag ${tag} already exists"
            exit 1
          fi

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [[ -n "${latest_tag}" ]]; then
            newest="$(printf '%s\n%s\n' "${latest_tag}" "${tag}" | sort -V | tail -n 1)"
            if [[ "${newest}" != "${tag}" || "${latest_tag}" == "${tag}" ]]; then
              echo "::error::${tag} must be newer than latest release tag ${latest_tag}"
              exit 1
            fi

            latest_commit="$(git rev-list -n 1 "${latest_tag}")"
            if ! git merge-base --is-ancestor "${latest_commit}" "${commit}"; then
              echo "::error::commit ${commit} must be after ${latest_tag} (${latest_commit})"
              exit 1
            fi
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"

      - name: Run CI at release commit
        # https://github.com/actions/checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ steps.validate.outputs.commit }}

      - name: Set up Go
        # https://github.com/actions/setup-go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod

      - name: Run CI
        run: go run ./cmd/scripts/main.go ci

      - name: Create and push tag
        shell: bash
        env:
          TAG: ${{ steps.validate.outputs.tag }}
          COMMIT: ${{ steps.validate.outputs.commit }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" "${COMMIT}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: validate-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout release commit
        # https://github.com/actions/checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-and-tag.outputs.commit }}

      - name: Set up Go
        # https://github.com/actions/setup-go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod

      - name: Build release asset
        id: build
        shell: bash
        env:
          VERSION: ${{ needs.validate-and-tag.outputs.version }}
        run: |
          set -euo pipefail

          asset_base="aws-mcp-proxy-${{ matrix.goos }}-${{ matrix.goarch }}"
          binary="aws-mcp-proxy"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            binary="${binary}.exe"
          fi

          mkdir -p "bin/${asset_base}"
          go run ./cmd/scripts/main.go build \
            --goos "${{ matrix.goos }}" \
            --goarch "${{ matrix.goarch }}" \
            --version "${VERSION}" \
            --output "bin/${asset_base}/${binary}"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd bin && zip -r "${asset_base}.zip" "${asset_base}")
            asset="${asset_base}.zip"
          else
            tar -C bin -czf "bin/${asset_base}.tar.gz" "${asset_base}"
            asset="${asset_base}.tar.gz"
          fi

          (cd bin && sha256sum "${asset}" > "${asset}.sha256")
          echo "asset=${asset}" >> "${GITHUB_OUTPUT}"

      - name: Upload packaged binary
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.build.outputs.asset }}
          path: |
            bin/${{ steps.build.outputs.asset }}
            bin/${{ steps.build.outputs.asset }}.sha256
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    needs:
      - validate-and-tag
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release assets
        # https://github.com/actions/download-artifact
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate-and-tag.outputs.tag }}
          COMMIT: ${{ needs.validate-and-tag.outputs.commit }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "::error::release ${TAG} already exists"
            exit 1
          fi

          gh release create "${TAG}" dist/* \
            --repo "${REPO}" \
            --target "${COMMIT}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
